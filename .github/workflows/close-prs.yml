name: Auto-close external PRs

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  close:
    runs-on: ubuntu-latest
    # Only run for PRs not opened by the repo owner
    if: github.event.pull_request.user.login != github.repository_owner
    steps:
      - name: Comment and close
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const number = context.payload.pull_request.number;
            const author = context.payload.pull_request.user.login;

            await github.rest.issues.createComment({
              owner, repo, issue_number: number,
              body: [
                `Hi @${author} — thanks for looking.`,
                ``,
                `This repo is a personal site and doesn't accept external contributions.`,
                `Closing this automatically. No hard feelings.`,
              ].join('\n'),
            });

            await github.rest.pulls.update({
              owner, repo, pull_number: number,
              state: 'closed',
            });
